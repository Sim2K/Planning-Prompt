<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Plan before you build. The free Veedence Robust Feature Planner turns vague AI feature requests into evidence-grounded, production-ready implementation plans."
    />
    <meta name="theme-color" content="#07110d" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Robust Feature Planner — Veedence" />
    <meta
      property="og:description"
      content="A free planning system for Claude Code, OpenAI Codex, and any LLM. Discover first, compare architectures, then build."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Robust Feature Planner — Veedence</title>
    <link rel="icon" type="image/png" href="./assets/veedence-mark.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        const key = "veedence-planner-theme";
        const saved = localStorage.getItem(key);
        const theme =
          saved === "light" || saved === "dark"
            ? saved
            : matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
        document.documentElement.dataset.theme = theme;
        document.documentElement.classList.add("js");
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
